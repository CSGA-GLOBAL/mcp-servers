<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a"/>
            <stop offset="50%" stop-color="#1e3a8a"/>
            <stop offset="100%" stop-color="#0f172a"/>
        </linearGradient>
        <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#3b82f6"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge> 
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bgGradient)"/>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
        <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(59, 130, 246, 0.1)" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
    
    <!-- CSGA Logo -->
    <rect x="80" y="80" width="60" height="60" fill="url(#textGradient)" rx="15"/>
    <text x="110" y="120" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#ffffff" text-anchor="middle">CS</text>
    
    <!-- Main Title -->
    <text x="180" y="120" font-family="Arial, sans-serif" font-weight="800" font-size="48" fill="url(#textGradient)" filter="url(#glow)">CSGA Global</text>
    
    <!-- Subtitle -->
    <text x="80" y="200" font-family="Arial, sans-serif" font-weight="700" font-size="72" fill="#ffffff" filter="url(#glow)">The FAA for AI</text>
    
    <!-- Description -->
    <text x="80" y="280" font-family="Arial, sans-serif" font-weight="600" font-size="36" fill="#94a3b8">Constitutional AI Governance Leader</text>
    
    <!-- Features -->
    <text x="80" y="340" font-family="Arial, sans-serif" font-weight="500" font-size="28" fill="#cbd5e1">✓ CASA Certification</text>
    <text x="80" y="380" font-family="Arial, sans-serif" font-weight="500" font-size="28" fill="#cbd5e1">✓ Byzantine Council Architecture</text>
    <text x="80" y="420" font-family="Arial, sans-serif" font-weight="500" font-size="28" fill="#cbd5e1">✓ Enterprise AI Compliance</text>
    
    <!-- Website -->
    <text x="80" y="520" font-family="Arial, sans-serif" font-weight="600" font-size="32" fill="#3b82f6">csga-global.org</text>
    
    <!-- AI Visualization -->
    <circle cx="900" cy="300" r="120" fill="rgba(59, 130, 246, 0.1)" stroke="rgba(59, 130, 246, 0.3)" stroke-width="2"/>
    <circle cx="900" cy="300" r="80" fill="rgba(16, 185, 129, 0.1)" stroke="rgba(16, 185, 129, 0.3)" stroke-width="2"/>
    <circle cx="900" cy="300" r="40" fill="rgba(239, 68, 68, 0.1)" stroke="rgba(239, 68, 68, 0.3)" stroke-width="2"/>
    <text x="900" y="310" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#ffffff" text-anchor="middle">AI</text>
</svg>
